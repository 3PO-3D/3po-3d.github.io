<header class="site-header">
  <div class="header-container">

    <a href="{{ '/' | relative_url }}" class="site-logo">
      <img
        id="site-logo-img"
        src="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}"
        data-light="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}"
        data-dark="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}"
        alt="3PO"
        style="height:32px;width:auto;display:block;flex-shrink:0;">
    </a>

    <div class="header-wordmark">
      {% if page.url contains '/chronos/' %}
        <img
          id="header-wordmark-img"
          src="{{ '/assets/img/CHRONOS_yellow_lighttheme_svg.svg' | relative_url }}"
          data-light="{{ '/assets/img/CHRONOS_yellow_lighttheme_svg.svg' | relative_url }}"
          data-dark="{{ '/assets/img/CHRONOS_yellow_darktheme_svg.svg' | relative_url }}"
          alt="CHRONOS"
          style="height:22px;width:auto;display:block;">
      {% else %}
        <img
          id="header-wordmark-img"
          src="/assets/img/CRAFTING%20YOUR%20TOMORROW_ligtheme_svg.svg"
          data-light="/assets/img/CRAFTING%20YOUR%20TOMORROW_ligtheme_svg.svg"
          data-dark="/assets/img/CRAFTING%20YOUR%20TOMORROW_darktheme_svg.svg"
          alt="Crafting Your Tomorrow"
          style="height:16px;width:auto;display:block;">
      {% endif %}
    </div>

    <nav class="site-nav">
      <a href="{{ '/chronos/' | relative_url }}"
         class="nav-chronos-logo{% if page.url contains '/chronos/' %} active{% endif %}"
         aria-label="CHRONOS">
        <img
          id="nav-chronos-logo"
          src="{{ '/assets/img/V41_3PO_LOGO_HEAD_(HARVEST_GOLD)_TRANS_SVG.svg' | relative_url }}"
          data-light="{{ '/assets/img/V41_3PO_LOGO_HEAD_(HARVEST_GOLD)_TRANS_SVG.svg' | relative_url }}"
          data-dark="{{ '/assets/img/V41_3PO_LOGO_HEAD_(HARVEST_GOLD)_WHITEFILL_SVG.svg' | relative_url }}"
          alt="CHRONOS"
          style="height:28px;width:auto;display:block;">
      </a>
      <button
        class="theme-toggle-btn"
        id="theme-toggle-btn"
        aria-label="Toggle theme"
        title="Toggle theme">
        <img
          id="theme-toggle-icon"
          src="{{ '/assets/icons/Cupcake.svg' | relative_url }}"
          data-light="{{ '/assets/icons/Cupcake.svg' | relative_url }}"
          data-dark="{{ '/assets/icons/Planet.svg' | relative_url }}"
          alt="Toggle theme"
          width="20" height="20">
      </button>
    </nav>

    <!-- Mobile: hamburger toggle (CSS-animated toggle switch) -->
    <button
      class="mobile-menu-toggle"
      id="mobile-menu-toggle"
      aria-label="Open navigation"
      aria-expanded="false">
      <span class="toggle-track">
        <span class="toggle-dot"></span>
      </span>
    </button>

  </div>
</header>

<!-- Mobile nav drawer -->
<div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>

<div class="mobile-nav-drawer" id="mobile-nav-drawer" aria-hidden="true">
  <div class="mobile-nav-header">
    <a href="{{ '/' | relative_url }}" class="mobile-nav-logo">
      <img
        src="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}"
        alt="3PO" height="36">
    </a>
    <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close navigation">
      <span class="toggle-track toggle-track--on">
        <span class="toggle-dot"></span>
      </span>
    </button>
  </div>

  <nav class="mobile-nav-links">
    {% if page.url contains '/chronos/' %}
      <a href="{{ '/chronos/' | relative_url }}"{% if page.url == '/chronos/' %} class="active"{% endif %}>Overview</a>
      <a href="{{ '/chronos/workflow/' | relative_url }}"{% if page.url contains 'workflow' %} class="active"{% endif %}>How It Works</a>
      <a href="{{ '/chronos/branching/' | relative_url }}"{% if page.url contains 'branching' %} class="active"{% endif %}>Branching</a>
      <a href="{{ '/chronos/roadmap/' | relative_url }}"{% if page.url contains 'roadmap' %} class="active"{% endif %}>Roadmap</a>
      <a href="{{ '/chronos/get-it/' | relative_url }}"{% if page.url contains 'get-it' %} class="active"{% endif %}>Get It</a>
    {% else %}
      <a href="{{ '/chronos/' | relative_url }}">C.H.R.O.N.O.S.</a>
    {% endif %}
  </nav>

  <div class="mobile-nav-footer">
    <button
      class="theme-toggle-btn theme-toggle-btn--mobile"
      id="theme-toggle-btn-mobile"
      aria-label="Toggle theme">
      <img
        id="theme-toggle-icon-mobile"
        src="{{ '/assets/icons/Cupcake.svg' | relative_url }}"
        data-light="{{ '/assets/icons/Cupcake.svg' | relative_url }}"
        data-dark="{{ '/assets/icons/Planet.svg' | relative_url }}"
        alt="Toggle theme"
        width="20" height="20">
      <span class="mobile-theme-label" id="mobile-theme-label">Gold + Burgundy</span>
    </button>
  </div>
</div>
