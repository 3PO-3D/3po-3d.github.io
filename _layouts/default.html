<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}">
  <script>
    // Apply theme immediately — before any paint — to prevent flash
    var DARK_THEMES = ['deep-space'];
    var _currentTheme = localStorage.getItem('theme') || 'gold-burgundy';
    document.documentElement.setAttribute('data-theme', _currentTheme);
  </script>
</head>
<body>
  {% include header.html %}

  <script>
    // Apply correct logo and wordmark src immediately after header is in the DOM
    (function() {
      var t = localStorage.getItem('theme') || 'gold-burgundy';
      var dark = DARK_THEMES.indexOf(t) !== -1;
      var logo = document.getElementById('site-logo-img');
      if (logo) logo.src = dark ? logo.getAttribute('data-dark') : logo.getAttribute('data-light');
      var wordmark = document.getElementById('header-wordmark-img');
      if (wordmark) wordmark.src = dark ? wordmark.getAttribute('data-dark') : wordmark.getAttribute('data-light');
    })();
  </script>

  <script>
    // Wire up theme switcher
    document.addEventListener('DOMContentLoaded', function() {
      var sel = document.getElementById('theme-switcher');
      if (!sel) return;
      sel.value = localStorage.getItem('theme') || 'gold-burgundy';
      sel.addEventListener('change', function() {
        var t = this.value;
        var dark = DARK_THEMES.indexOf(t) !== -1;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        var logo = document.getElementById('site-logo-img');
        if (logo) logo.src = dark ? logo.getAttribute('data-dark') : logo.getAttribute('data-light');
        var wordmark = document.getElementById('header-wordmark-img');
        if (wordmark) wordmark.src = dark ? wordmark.getAttribute('data-dark') : wordmark.getAttribute('data-light');
      });
    });
  </script>

  {{ content }}
  {% include footer.html %}
</body>
</html>
