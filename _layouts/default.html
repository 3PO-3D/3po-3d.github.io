<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}">
  <script>
    var DARK_THEMES = ['deep-space'];
    var _currentTheme = localStorage.getItem('theme') || 'gold-burgundy';
    document.documentElement.setAttribute('data-theme', _currentTheme);
  </script>
</head>
<body>
  {% include header.html %}

  <script>
    // Apply all theme-dependent images immediately after header is parsed
    (function() {
      var t = localStorage.getItem('theme') || 'gold-burgundy';
      var dark = DARK_THEMES.indexOf(t) !== -1;

      function swapImg(id) {
        var el = document.getElementById(id);
        if (el) el.src = dark ? el.getAttribute('data-dark') : el.getAttribute('data-light');
      }

      swapImg('site-logo-img');
      swapImg('header-wordmark-img');
      swapImg('theme-toggle-icon');
      swapImg('theme-toggle-icon-mobile');
      swapImg('nav-chronos-logo');
      swapImg('footer-email-icon');
      swapImg('footer-qa-icon');

      // Set mobile theme label
      var label = document.getElementById('mobile-theme-label');
      if (label) label.textContent = dark ? 'Deep Space' : 'Gold + Burgundy';
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {

      // ─── Theme swap helper ───────────────────────────────────
      function swapImg(id) {
        var el = document.getElementById(id);
        if (!el) return;
        var dark = DARK_THEMES.indexOf(localStorage.getItem('theme') || 'gold-burgundy') !== -1;
        el.src = dark ? el.getAttribute('data-dark') : el.getAttribute('data-light');
      }

      function applyTheme(t) {
        var dark = DARK_THEMES.indexOf(t) !== -1;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        swapImg('site-logo-img');
        swapImg('header-wordmark-img');
        swapImg('theme-toggle-icon');
        swapImg('theme-toggle-icon-mobile');
        swapImg('nav-chronos-logo');
        swapImg('footer-email-icon');
        swapImg('footer-qa-icon');
        var label = document.getElementById('mobile-theme-label');
        if (label) label.textContent = dark ? 'Deep Space' : 'Gold + Burgundy';
      }

      // Desktop theme toggle
      var btn = document.getElementById('theme-toggle-btn');
      if (btn) {
        btn.addEventListener('click', function() {
          var current = localStorage.getItem('theme') || 'gold-burgundy';
          applyTheme(DARK_THEMES.indexOf(current) !== -1 ? 'gold-burgundy' : 'deep-space');
        });
      }

      // Mobile theme toggle (inside drawer)
      var mobileThemeBtn = document.getElementById('theme-toggle-btn-mobile');
      if (mobileThemeBtn) {
        mobileThemeBtn.addEventListener('click', function() {
          var current = localStorage.getItem('theme') || 'gold-burgundy';
          applyTheme(DARK_THEMES.indexOf(current) !== -1 ? 'gold-burgundy' : 'deep-space');
        });
      }

      // ─── Mobile nav drawer ───────────────────────────────────
      var toggle   = document.getElementById('mobile-menu-toggle');
      var close    = document.getElementById('mobile-nav-close');
      var overlay  = document.getElementById('mobile-nav-overlay');
      var drawer   = document.getElementById('mobile-nav-drawer');

      function openDrawer() {
        document.body.classList.add('nav-open');
        if (drawer)  { drawer.classList.add('is-open');  drawer.setAttribute('aria-hidden', 'false'); }
        if (overlay) overlay.classList.add('is-visible');
        if (toggle)  toggle.setAttribute('aria-expanded', 'true');
      }

      function closeDrawer() {
        document.body.classList.remove('nav-open');
        if (drawer)  { drawer.classList.remove('is-open'); drawer.setAttribute('aria-hidden', 'true'); }
        if (overlay) overlay.classList.remove('is-visible');
        if (toggle)  toggle.setAttribute('aria-expanded', 'false');
      }

      if (toggle)  toggle.addEventListener('click', openDrawer);
      if (close)   close.addEventListener('click', closeDrawer);
      if (overlay) overlay.addEventListener('click', closeDrawer);

      // Close drawer on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDrawer();
      });

      // Close drawer on link click (navigation)
      if (drawer) {
        drawer.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', closeDrawer);
        });
      }
    });
  </script>

  {{ content }}
  {% include footer.html %}
</body>
</html>
