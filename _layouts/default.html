<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}">
  <script>
    var DARK_THEMES = ['deep-space'];
    var _currentTheme = localStorage.getItem('theme') || 'gold-burgundy';
    document.documentElement.setAttribute('data-theme', _currentTheme);
  </script>
</head>
<body>
  {% include header.html %}

  <script>
    // Apply all theme-dependent images immediately after header is parsed
    (function() {
      var t = localStorage.getItem('theme') || 'gold-burgundy';
      var dark = DARK_THEMES.indexOf(t) !== -1;

      function swapImg(id) {
        var el = document.getElementById(id);
        if (el) el.src = dark ? el.getAttribute('data-dark') : el.getAttribute('data-light');
      }

      swapImg('site-logo-img');
      swapImg('header-wordmark-img');
      swapImg('theme-toggle-icon');
      swapImg('nav-chronos-logo');
      swapImg('footer-email-icon');
      swapImg('footer-qa-icon');
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {

      // ─── Theme toggle ────────────────────────────────────────
      function applyTheme(t) {
        var dark = DARK_THEMES.indexOf(t) !== -1;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);

        function swapImg(id) {
          var el = document.getElementById(id);
          if (el) el.src = dark ? el.getAttribute('data-dark') : el.getAttribute('data-light');
        }

        swapImg('site-logo-img');
        swapImg('header-wordmark-img');
        swapImg('theme-toggle-icon');
        swapImg('nav-chronos-logo');
        swapImg('footer-email-icon');
        swapImg('footer-qa-icon');
      }

      var themeBtn = document.getElementById('theme-toggle-btn');
      if (themeBtn) {
        themeBtn.addEventListener('click', function() {
          var current = localStorage.getItem('theme') || 'gold-burgundy';
          applyTheme(DARK_THEMES.indexOf(current) !== -1 ? 'gold-burgundy' : 'deep-space');
        });
      }

      // ─── Logo Carousel ────────────────────────────────────────
      (function() {
        var carousel = document.getElementById('logo-carousel');
        if (!carousel) return;

        var items = Array.from(carousel.querySelectorAll('.logo-carousel__item'));
        var activeIndex = items.findIndex(function(el) {
          return el.classList.contains('is-active');
        });
        if (activeIndex < 0) activeIndex = 0;

        function setActive(idx) {
          items.forEach(function(el, i) {
            el.classList.toggle('is-active', i === idx);
          });
          activeIndex = idx;
        }

        // Click: navigate (follow the link naturally — no JS needed)
        // But also update visual state immediately before navigation
        items.forEach(function(el, i) {
          el.addEventListener('click', function() {
            setActive(i);
            // Let the href navigate — don't preventDefault
          });
        });

        // Touch swipe: cycle through logos without navigating
        var touchStartX = 0;
        carousel.addEventListener('touchstart', function(e) {
          touchStartX = e.touches[0].clientX;
        }, { passive: true });

        carousel.addEventListener('touchend', function(e) {
          var dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) < 30) return; // threshold — ignore tiny movements
          if (dx < 0) {
            // swipe left → next logo
            setActive((activeIndex + 1) % items.length);
          } else {
            // swipe right → prev logo
            setActive((activeIndex - 1 + items.length) % items.length);
          }
          e.preventDefault(); // prevent accidental navigation on swipe
        }, { passive: false });
      })();

      // ─── Mobile CHRONOS nav panel ────────────────────────────────────────
      var toggle  = document.getElementById('mobile-menu-toggle');
      var panel   = document.getElementById('mobile-nav-panel');

      if (toggle && panel) {
        toggle.addEventListener('click', function() {
          var isOpen = panel.classList.toggle('is-open');
          panel.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
          toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          // Toggle switch visual state
          var track = toggle.querySelector('.toggle-track');
          if (track) track.classList.toggle('toggle-track--on', isOpen);
        });

        // Close panel when a nav link is clicked
        panel.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', function() {
            panel.classList.remove('is-open');
            panel.setAttribute('aria-hidden', 'true');
            toggle.setAttribute('aria-expanded', 'false');
            var track = toggle.querySelector('.toggle-track');
            if (track) track.classList.remove('toggle-track--on');
          });
        });

        // Close on Escape
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            panel.classList.remove('is-open');
            panel.setAttribute('aria-hidden', 'true');
            toggle.setAttribute('aria-expanded', 'false');
            var track = toggle.querySelector('.toggle-track');
            if (track) track.classList.remove('toggle-track--on');
          }
        });
      }
    });
  </script>

  {{ content }}
  {% include footer.html %}
</body>
</html>
