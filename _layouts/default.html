<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/V0_3PO_LOGO-HEAD_TRANS.svg' | relative_url }}">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'gold-burgundy';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <script>
    var DARK_THEMES = ['deep-space'];
    function applyLogoTheme(theme) {
      var img = document.getElementById('site-logo-img');
      if (!img) return;
      img.src = DARK_THEMES.indexOf(theme) !== -1 ? img.dataset.dark : img.dataset.light;
    }
    document.addEventListener('DOMContentLoaded', function() {
      var sel = document.getElementById('theme-switcher');
      var t = localStorage.getItem('theme') || 'gold-burgundy';
      if (sel) sel.value = t;
      applyLogoTheme(t);
      if (!sel) return;
      sel.addEventListener('change', function() {
        var t = this.value;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        applyLogoTheme(t);
      });
    });
  </script>
  {% include header.html %}
  {{ content }}
  {% include footer.html %}
</body>
</html>
