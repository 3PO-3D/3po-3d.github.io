<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/V0_3PO_LOGO-HEAD_WHITEFILL_SVG.svg' | relative_url }}">
  <script>
    var DARK_THEMES = ['deep-space'];
    var _currentTheme = localStorage.getItem('theme') || 'gold-burgundy';
    document.documentElement.setAttribute('data-theme', _currentTheme);
  </script>
</head>
<body>
  {% include header.html %}

  <script>
    // Apply all theme-dependent images immediately after header is parsed
    (function() {
      var t = localStorage.getItem('theme') || 'gold-burgundy';
      var dark = DARK_THEMES.indexOf(t) !== -1;

      function swapImg(id) {
        var el = document.getElementById(id);
        if (el) el.src = dark ? el.getAttribute('data-dark') : el.getAttribute('data-light');
      }

      swapImg('site-logo-img');
      swapImg('header-wordmark-img');
      swapImg('theme-toggle-icon');
      swapImg('nav-chronos-logo');
      swapImg('footer-email-icon');
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('theme-toggle-btn');
      if (!btn) return;

      function applyTheme(t) {
        var dark = DARK_THEMES.indexOf(t) !== -1;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);

        function swapImg(id) {
          var el = document.getElementById(id);
          if (el) el.src = dark ? el.getAttribute('data-dark') : el.getAttribute('data-light');
        }

        swapImg('site-logo-img');
        swapImg('header-wordmark-img');
        swapImg('theme-toggle-icon');
        swapImg('nav-chronos-logo');
        swapImg('footer-email-icon');
      }

      btn.addEventListener('click', function() {
        var current = localStorage.getItem('theme') || 'gold-burgundy';
        var next = DARK_THEMES.indexOf(current) !== -1 ? 'gold-burgundy' : 'deep-space';
        applyTheme(next);
      });
    });
  </script>

  {{ content }}
  {% include footer.html %}
</body>
</html>
